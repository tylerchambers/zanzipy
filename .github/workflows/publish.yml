name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"
          enable-cache: true

      - run: uv sync --locked --all-extras --dev
      - run: make lint
      - run: make typecheck
      - run: make test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Check release tag matches pyproject version
        run: |
          python - <<'PY'
          import os, tomllib

          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]

          if tag not in {version, f"v{version}"}:
              raise SystemExit(f"release tag {tag!r} does not match pyproject version {version!r}")
          PY

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke-test wheel import
        run: uv run --no-project --with dist/*.whl -- python -c "import zanzipy"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zanzipy
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
